name: CI/CD Pipeline - Spring PetClinic

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write   # Requis pour la fédération OIDC AWS sans clé stockée
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: petclinic-repo

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      # --- ÉTAPE 0 : Authentification OIDC sans clé ---
      - name: Configurer les identifiants AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT>:role/petclinic-ci
          aws-region: ${{ env.AWS_REGION }}

      # --- ÉTAPE 1 : Build, tests unitaires ---
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Compilation et tests (Maven)
        run: mvn -B verify

      # --- ÉTAPE 2 : Qualité & sécurité (tfsec, Sonar, Trivy) ---
      - name: Scan IaC avec tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform

      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # --- ÉTAPE 3 : Image Docker vers ECR ---
      - name: Build et push de l'image Docker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHA .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHA

      # --- ÉTAPE 4 : Infrastructure Terraform ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init, Validate & Plan
        working-directory: terraform
        run: |
          terraform init
          terraform fmt -check
          terraform validate
          terraform plan -out tf.plan

      - name: Terraform Apply (Backend S3 + Verrou DynamoDB)
        working-directory: terraform
        run: terraform apply tf.plan

      # --- ÉTAPE 5 : Déploiement ECS ---
      - name: Mise à jour du service ECS
        run: |
          aws ecs update-service \
            --cluster petclinic-cluster \
            --service petclinic-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      # --- ÉTAPE 6 : Smoke test et Rollback automatique ---
      - name: Smoke test et Rollback
        run: |
          sleep 20
          ALB_DNS=$(aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} --query "LoadBalancers[?contains(LoadBalancerName, 'petclinic')].DNSName" --output text | head -n 1)
          
          if curl -f http://$ALB_DNS/actuator/health; then
            echo "Smoke test réussi !"
          else
            echo "Échec du smoke test : déclenchement du rollback"
            exit 1
          fi